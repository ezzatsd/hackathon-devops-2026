apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackathon-node-app
  namespace: platform-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hackathon-node-app
  template:
    metadata:
      labels:
        app: hackathon-node-app
    spec:
      containers:
        - name: hackathon-node-app
          image: hackathondevopsdevacr.azurecr.io/hackathon-node-app:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: node-app-config
            - secretRef:
                name: node-app-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hackathon-node-app
  namespace: platform-demo
spec:
  selector:
    app: hackathon-node-app
  ports:
    - port: 80
      targetPort: 3000
